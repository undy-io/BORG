version: "3.8"
services:
  app:
    image: borg-app:devcontainer
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/borg:cached
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: borg_test
      DATABASE_URL: postgresql://postgres:postgres@db:5432/borg_test
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379/0
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: borg-dev
      S3_USE_PATH_STYLE: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - borg-net
    command: sleep infinity

  db:
    image: borg-db:devcontainer
    build:
      context: .
      dockerfile: db.Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: borg_test
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d borg_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - borg-net

  redis:
    image: redis:8-trixie
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - borg-net

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - borg-net

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    entrypoint: /bin/sh
    command: >-
      -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/borg-dev
      "
    networks:
      - borg-net

networks:
  borg-net: {}

volumes:
  postgres-data: {}
  redis-data: {}
  minio-data: {}
