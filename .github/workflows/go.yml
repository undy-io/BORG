name: Go CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build BORG
        run: go build ./cmd/borg

      - name: Build borg-genkey
        run: go build ./cmd/borg-genkey

  smoke:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Sync smoke test dependencies
        run: uv sync --frozen

      - name: Build Go smoke binary
        run: |
          mkdir -p bin
          go build -o bin/borg-go ./cmd/borg

      - name: Run fake Kubernetes smoke tests
        run: uv run pytest -q tests/k8s_smoke
