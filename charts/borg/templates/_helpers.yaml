{{- define "borg.name" -}}
{{- .Chart.Name | trunc 63 | trimSuffix "-" -}}
{{- end }}

{{- define "borg.fullname" -}}
{{- printf "%s-%s" .Release.Name (include "borg.name" .) | trunc 63 | trimSuffix "-" -}}
{{- end }}

{{- define "borg.chart" -}}
{{- printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" -}}
{{- end }}

{{- define "borg.ingressTLSSecretName" -}}
{{- default (printf "%s-tls" .Release.Name) .Values.ingress.tls.secretName -}}
{{- end -}}

{{- define "borg.certificateSecretName" -}}
{{- default (printf "%s-tls" .Release.Name) .Values.certificate.secretName -}}
{{- end -}}

{{- define "borg.serverTLSSecretName" -}}
{{- default (include "borg.certificateSecretName" .) .Values.server.tls.secretName -}}
{{- end -}}
