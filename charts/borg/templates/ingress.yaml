{{- if .Values.ingress.enabled }}

{{- $useTLS := and .Values.ingress.tls.enabled
	                 ( or .Values.ingress.tls.existingSecret
	                      .Values.ingress.tls.secretName
	                      (and .Values.ingress.issuer.cert.enabled
	                           (.Capabilities.APIVersions.Has "cert-manager.io/v1") ) ) }}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "borg.fullname" . }}
  namespace: {{ .Release.Namespace }}
  {{- with .Values.ingress.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "borg.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
  {{- if $useTLS }}
  tls:
    - secretName: {{ default (include "borg.ingressTLSSecretName" .) .Values.ingress.tls.existingSecret }}
      hosts:
        {{- range .Values.ingress.hosts }}
        - {{ .host }}
        {{- end }}
  {{- end }}
{{- end }}
