{{- /*
     authKeySecret:
       name: my-auth-secret
       key:  AUTH_KEY                 # the map key inside the Secret (required)
       value: ""                      # optional raw auth key string; leave empty to auto-generate
*/ -}}

{{- $name      := .Values.authKeySecret.name | default (printf "%s-auth" .Release.Name) }}
{{- $key       := .Values.authKeySecret.key  | required "authKeySecret.key must be set" }}
{{- $keyValue := .Values.authKeySecret.value }}
{{- $existing  := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $existingValue := "" }}
{{- if $existing }}
{{- if $existing.data }}
{{- if hasKey $existing.data $key }}
{{- $existingValue = index $existing.data $key }}
{{- end }}
{{- end }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  {{- /* Reuse existing values on upgrade, but migrate legacy raw-byte secrets to text-safe form. */}}
  {{- if $existingValue }}
  {{- $decodedExisting := $existingValue | b64dec }}
  {{- if eq (len $decodedExisting) 32 }}
  {{ $key }}: {{ $decodedExisting | b64enc | b64enc }}
  {{- else }}
  {{ $key }}: {{ $existingValue }}
  {{- end }}
  {{- /* Operator-supplied values are raw auth key strings; encode for Secret.data. */}}
  {{- else if $keyValue }}
  {{ $key }}: {{ $keyValue | b64enc }}
  {{- /* randBytes already returns base64 text; encode once more for Secret.data. */}}
  {{- else }}
  {{ $key }}: {{ randBytes 32 | b64enc }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.apikeySecrets.name }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  {{- range .Values.config.instances }}
  {{- if .apikeyEnv }}
  {{ .apikeyEnv }}: {{ .apikey | default "EMPTY" }}
  {{- end }}
  {{- end }}
