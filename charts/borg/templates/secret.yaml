{{- /*
     authKeySecret:
       name: my-auth-secret
       key:  AUTH_KEY                 # the map key inside the Secret (required)
       value: ""                      # optional URL-safe auth key string; leave empty to auto-generate
*/ -}}

{{- $name      := .Values.authKeySecret.name | default (printf "%s-auth" .Release.Name) }}
{{- $key       := .Values.authKeySecret.key  | required "authKeySecret.key must be set" }}
{{- $keyValue := .Values.authKeySecret.value }}
{{- $existing  := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $existingValue := "" }}
{{- if $existing }}
{{- if $existing.data }}
{{- if hasKey $existing.data $key }}
{{- $existingValue = index $existing.data $key }}
{{- end }}
{{- end }}
{{- end }}
{{- $hasAPIKeySecrets := false }}
{{- range .Values.config.instances }}
{{- if .apikeyEnv }}
{{- $hasAPIKeySecrets = true }}
{{- end }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  {{- /* Reuse existing values on upgrade, but normalize auth key text to URL-safe base64. */}}
  {{- if $existingValue }}
  {{- $decodedExisting := $existingValue | b64dec }}
  {{- if eq (len $decodedExisting) 32 }}
  {{ $key }}: {{ $decodedExisting | b64enc | replace "+" "-" | replace "/" "_" | b64enc }}
  {{- else }}
  {{ $key }}: {{ $decodedExisting | replace "+" "-" | replace "/" "_" | b64enc }}
  {{- end }}
  {{- /* Operator-supplied values are URL-safe auth key strings; encode for Secret.data. */}}
  {{- else if $keyValue }}
  {{ $key }}: {{ $keyValue | replace "+" "-" | replace "/" "_" | b64enc }}
  {{- /* randBytes returns base64 text; normalize to URL-safe and encode for Secret.data. */}}
  {{- else }}
  {{ $key }}: {{ randBytes 32 | replace "+" "-" | replace "/" "_" | b64enc }}
  {{- end }}
{{- if $hasAPIKeySecrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.apikeySecrets.name }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  {{- range .Values.config.instances }}
  {{- if .apikeyEnv }}
  {{ .apikeyEnv }}: {{ .apikey | default "EMPTY" }}
  {{- end }}
  {{- end }}
{{- end }}
