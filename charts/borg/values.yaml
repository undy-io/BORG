replicaCount: 2

image:
  # Go BORG runtime image. The chart no longer runs the Python service by default.
  repository: ghcr.io/undy-io/borg
  tag: "0.1.2"
  pullPolicy: IfNotPresent

authKeySecret:
  name: borg-auth
  key: BORG_AUTH_KEY
  # Optional URL-safe auth key string. This should be the printable base64url
  # value the app consumes, not a Secret.data-encoded blob.
  # value: ""

apikeySecrets:
  name: borg-apikeys

config:
  auth_prefix: "BORG:"
  update_interval: 30
  instances: []
  # - endpoint: http://10.0.0.5:8000
  #   apikeyEnv: VLLM_APIKEY_1
  #   models: ["gpt-3.5-turbo"]
  k8s_discover:
    - namespace: vllm-services
      selector: borg/expose=default
      modelkey: borg/models

server:
  tls:
    enabled: false
    secretName: ""
    mountPath: /app/tls
    certKey: tls.crt
    privateKeyKey: tls.key

ingress:
  enabled: false
  className: "nginx"
  issuer:
    name: pkirules-tls
    kind: Issuer  # Could be ClusterIssuer for other environments
    scope: namespaced  # or "cluster" if you ever switch
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert:
      enabled: true
      subject:
        #commonName:
        organizations: []
        organizationalUnits: []
        countries: []
        localities: []
        provinces: []
      altNames: []
  hosts:
    - host: borg.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    existingSecret: null
    secretName: ""

certificate:
  # Set enabled=true to create a cert-manager Certificate independently of Ingress.
  enabled: false
  labels: {}
  annotations: {}
  secretName: ""
  commonName: ""
  dnsNames: []
  # altNames is kept as a friendly alias for additional DNS SANs.
  altNames: []
  ipAddresses: []
  uris: []
  emailAddresses: []
  issuerRef:
    name: ""
    kind: Issuer
    group: cert-manager.io
  usages: []
  subject:
    organizations: []
    organizationalUnits: []
    countries: []
    localities: []
    provinces: []
    streetAddresses: []
    postalCodes: []
    serialNumber: ""

service:
  type: ClusterIP
  labels: {}
  annotations: {}
  # loadBalancerClass: io.cilium/l2-announcer
  # loadBalancerIP is legacy but still supported by Cilium LB IPAM.
  # Prefer the lbipam.cilium.io/ips annotation for requested IPs.
  # loadBalancerIP: ""
  loadBalancerSourceRanges: []
  # externalTrafficPolicy: Cluster
  port: 80
  targetPort: 8000
